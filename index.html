  :root {
    --bg: #f4f6f9;

    --border: #e5e7eb;

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 24px;
  }

  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);

  }

  }

  }

  p {
    margin: 0 0 12px;
  }

  .subtitle {
    font-weight: bold;
    color: var(--accent);
    margin-bottom: 12px;
  }
